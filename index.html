<!DOCTYPE html>

<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins;background:#f5f7fa;color:#333}

/* HEADER */
header{
background:linear-gradient(90deg,#0f2027,#203a43,#2c5364);
color:#fff;
padding:90px 20px;
text-align:center;
}

header h1{font-size:38px;margin-bottom:20px}
header p{max-width:850px;margin:auto;font-size:20px}

/* BOTÃO PRINCIPAL */
.btn{
display:inline-block;
margin-top:30px;
padding:18px 35px;
background:#25D366;
color:#fff;
text-decoration:none;
border-radius:50px;
font-weight:600;
position:relative;
overflow:hidden;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(37,211,102,.6)}
70%{box-shadow:0 0 0 22px rgba(37,211,102,0)}
100%{box-shadow:0 0 0 0 rgba(37,211,102,0)}
}

.section{padding:80px 20px;max-width:1100px;margin:auto;text-align:center}

/* CONSULTOR */
.consultor-grid{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-top:40px;
}

.consultor-item{
background:#fff;
padding:30px;
width:210px;
border-radius:15px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,.1);
transition:.3s;
font-size:20px;
}

.consultor-item:hover{transform:translateY(-6px)}

.consultor-modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.6);
z-index:999;
}

.consultor-box{
background:#fff;
max-width:460px;
margin:6% auto;
padding:35px;
border-radius:18px;
text-align:center;
position:relative;
}

.fechar{
position:absolute;
top:10px;
right:15px;
font-size:22px;
cursor:pointer;
}

.consultor-box button{
width:100%;
margin:14px 0;
padding:20px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#203a43,#2c5364);
color:#fff;
cursor:pointer;
font-size:18px;
font-weight:600;
}

/* AVALIAÇÕES */
.avaliacoes{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#fff;
padding:90px 20px;
text-align:center;
}

footer{
background:#000;
color:#fff;
padding:30px;
text-align:center;
}

.whatsapp-fixo{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:#fff;
padding:14px 18px;
border-radius:30px;
text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>Fábrica de Tinta em Itaquaquecetuba</h1>
<p>
Tinta acrílica, tinta emborrachada, massa PVA, grafiato e texturas direto da fábrica com alto rendimento e entrega rápida no Alto Tietê.
</p>
<a class="btn"
href="https://wa.me/5511954950044?text=Olá,%20quero%20orçamento."
target="_blank">
Solicitar Orçamento Agora
</a>
</header>

<section class="section">
<h2>Descubra o produto ideal para sua obra</h2>
<div class="consultor-grid">
<div class="consultor-item" onclick="abrirConsultor('tintas')">🎨<br>Tintas</div>
<div class="consultor-item" onclick="abrirConsultor('massas')">🧱<br>Massas</div>
<div class="consultor-item" onclick="abrirConsultor('texturas')">🏗<br>Texturas</div>
<div class="consultor-item" onclick="abrirConsultor('preparacao')">🛠<br>Preparação</div>
</div>
</section>

<div id="consultorModal" class="consultor-modal">
<div class="consultor-box">
<span class="fechar" onclick="fecharConsultor()">✖</span>
<div id="consultorConteudo"></div>
</div>
</div>

<script>
const numeroWhats="5511954950044";
let historico=[];
const consultorConteudo=document.getElementById("consultorConteudo");

function fecharConsultor(){
document.getElementById("consultorModal").style.display="none";
}

function mostrar(html){
consultorConteudo.innerHTML=html;
}

function tela(html){
historico.push(html);
mostrar(html);
}

function voltar(){
historico.pop();
mostrar(historico[historico.length-1]);
}

function produto(nome,desc){
const msg=encodeURIComponent(`Olá! Quero orçamento de ${nome}.`);
tela(`
<h3>${nome}</h3>
<p style="margin:15px 0">${desc}</p>
<a href="https://wa.me/${numeroWhats}?text=${msg}" target="_blank">
<button style="background:#25D366">📲 Solicitar orçamento</button>
</a>
<button onclick="voltar()">⬅ Voltar</button>
`);
}

function abrirConsultor(tipo){
document.getElementById("consultorModal").style.display="block";
historico=[];

if(tipo==="tintas"){
tela(`
<h3>Onde será aplicada a tinta?</h3>
<button onclick="produto('Qualy Color Econômica','Ideal para ambientes internos.')">🏠 Uso Interno</button>
<button onclick="produto('Tinta Premium Externa','Alta durabilidade.')">🌤 Uso Externo</button>
`);
}

if(tipo==="massas"){
tela(`
<h3>Escolha a massa:</h3>
<button onclick="produto('Massa PVA','Uso interno.')">Massa PVA</button>
<button onclick="produto('Massa Acrílica','Uso interno e externo.')">Massa Acrílica</button>
`);
}

if(tipo==="texturas"){
tela(`
<h3>Escolha a textura:</h3>
<button onclick="produto('Grafiato','Acabamento decorativo resistente.')">Grafiato</button>
<button onclick="produto('Textura Lisa','Visual moderno.')">Textura Lisa</button>
`);
}

if(tipo==="preparacao"){
tela(`
<h3>Preparação:</h3>
<button onclick="produto('Seladora Acrílica','Para paredes novas.')">Seladora</button>
<button onclick="produto('Fundo Preparador','Para repintura.')">Fundo Preparador</button>
`);
}
}
</script>

</body>
</html>
